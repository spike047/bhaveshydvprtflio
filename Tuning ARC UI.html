<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUNINGARC</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #1e1e1e;
            color: #fff;
            overflow: hidden;
        }

        header {
            position: relative;
            text-align: center;
            padding: 20px;
            background: linear-gradient(90deg, #ff7b00, #ffcc00);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        header h2 {
            margin: 0;
            font-size: 2.5em;
            color: #222;
        }

        header h3 {
            margin: 5px 0 0;
            font-size: 1.2em;
            color: #444;
        }

        nav {
            margin-top: 10px;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            margin: 0 15px;
            font-size: 1.2em;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #ffcc00;
        }

        /* Floating Music Notes and Instruments */
        .floating-elements {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            z-index: -1;
        }

        .note, .instrument {
            position: absolute;
            font-size: 2.5rem;
            opacity: 0.8;
            animation: floatUp 6s linear infinite;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0.8;
            }
            100% {
                transform: translateY(-10vh) rotate(360deg);
                opacity: 0;
            }
        }

        #content-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }

        #content-overlay h3 {
            margin-bottom: 20px;
            font-size: 2em;
        }

        #content-overlay button {
            padding: 10px 20px;
            font-size: 1.2em;
            border: none;
            background: #ff7b00;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        #content-overlay button:hover {
            background: #ffcc00;
        }

    </style>
</head>
<body>
    <header>
        <h2>TUNINGARC</h2>
        <h3>*Experience The Music Dynamically*</h3>
        <nav>
            <a href="About.html">About</a>
            <a href="courses.html">Courses</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <!-- Floating Music Notes & Instruments -->
    <div class="floating-elements">
        <span class="note" style="left: 5%; animation-duration: 6s;">🎵</span>
        <span class="note" style="left: 15%; animation-duration: 5s;">🎼</span>
        <span class="note" style="left: 25%; animation-duration: 7s;">🎶</span>
        <span class="instrument" style="left: 35%; animation-duration: 8s;">🎸</span>  <!-- Guitar -->
        <span class="note" style="left: 45%; animation-duration: 4s;">🎵</span>
        <span class="instrument" style="left: 55%; animation-duration: 9s;">🎹</span>  <!-- Piano -->
        <span class="note" style="left: 65%; animation-duration: 6.5s;">🎼</span>
        <span class="instrument" style="left: 75%; animation-duration: 7.5s;">🎻</span>  <!-- Violin -->
        <span class="note" style="left: 85%; animation-duration: 4.5s;">🎶</span>
        <span class="note" style="left: 95%; animation-duration: 6s;">🎵</span>
    </div>

    <div id="content-overlay">
        <h3>Welcome to TUNINGARC</h3>
        <a href="index.html"><button>Get Started</button></a>
    </div>

</body>
</html>
