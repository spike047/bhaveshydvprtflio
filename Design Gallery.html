  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html{
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to right, #2c5364, #203a43, #0f2027);
      color: white;
      text-align: center;
    }

    h1 {
      color: #00c6ff;
      margin: 40px 0 20px;
      font-size: 40px;
    }

    h2 {
      color: #00c6ff;
      margin: 40px 0 20px;
      font-size: 20px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(grid, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .gallery img {
      width: 100%;
      max-width: 500px;
      border-radius: 10px;
      box-shadow: 0 0 25px rgba(0,0,0,0.5);
      transition: transform 0.3s ease;
    }

    .gallery img:hover {
      transform: scale(1.05);
       transition: transform 0.3s ease;
    }

    a.back-link {
      display: inline-block;
      margin: 20px;
      color: #00c6ff;
      text-decoration: none;
      font-weight: 600;
      position: relative;
      transition: color 0.3s ease;
    }

    .back-link::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: -4px;
      width: 100%;
      height: 2px;
      background: #00c6ff;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
    }

    .back-link:hover::after {
      transform: scaleX(1);
    }

    .back-link:hover {
      color: #66e0ff;
      transform: scale(1.05);
       transition: transform 0.3s ease;
    }

  
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0f2027;
      padding: 15px 20px;
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid #00c6ff;
    }

    .nav-brand {
      color: #00c6ff;
      font-size: 25px;
      font-weight: bold;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 25px;
    }

    .nav-links li a {
      color: #ffffff;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .nav-links li a:hover {
      color: #66e0ff;
    }

    .hamburger {
      display: none;
      font-size: 28px;
      color: #00c6ff;
      background: none;
      border: none;
      cursor: pointer;
    }

   @media (max-width: 768px) {
  .nav-links {
    display: none;
    flex-direction: column;
    background: #0f2027;
    position: absolute;
    top: 60px;
    right: 20px;
    width: 200px;
    border: 1px solid #00c6ff;
    padding: 10px;
    border-radius: 10px;
  }

  .nav-links.show {
    display: flex;
  }

  .hamburger {
    display: block;
  }
}


    @media (max-width: 600px) {
      .gallery img {
        max-width: 90%;
      }
    }
    
  </style>
</head>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init({ duration: 800, 
    mirror: true});

    const hamburger = document.getElementById('hamburger');
  const navLinks = document.getElementById('navbar-desktop-links');

  
  hamburger.addEventListener('click', () => {
    navLinks.classList.toggle('show');
  });

  
  document.addEventListener('click', function (event) {
    if (!event.target.closest('.navbar')) {
      navLinks.classList.remove('show');
    }
    });
  </script>
