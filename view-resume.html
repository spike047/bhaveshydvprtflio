<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Resume Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <style>
    html {
      scroll-behavior: smooth;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #141e30, #243b55);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      color: #fff;
    }

    section#view-resume {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
      padding: 50px 40px;
      max-width: 900px;
      width: 45%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 35px;
      animation: fadeInUp 1s ease-out both;
    }

    /* Responsive for smaller devices like Android phones */
    @media (max-width: 768px) {
      section#view-resume {
        padding: 30px 20px;
        width: 95%;
        gap: 25px;
        border-radius: 12px;
      }
    }

    @media (max-width: 480px) {
      section#view-resume {
        padding: 20px 15px;
        gap: 20px;
        border-radius: 10px;
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    section#view-resume img {
      width: 100%;
      max-width: 650px;
      height: auto;
      border-radius: 12px;
      border: 2px solid #00c6ff88;
      box-shadow: 0 10px 30px rgba(0, 198, 255, 0.25);
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }

    section#view-resume img:hover {
      transform: scale(1.03);
      box-shadow: 0 15px 40px rgba(0, 198, 255, 0.45);
    }

    section#view-resume a.back-link {
      font-size: 1.2rem;
      color: #00c6ff;
      font-weight: 600;
      position: relative;
      text-decoration: none;
      transition: color 0.3s ease, transform 0.3s ease;
      padding-bottom: 4px;
    }

    section#view-resume a.back-link::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 2px;
      background: #00c6ff;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
    }

    section#view-resume a.back-link:hover {
      color: #66e0ff;
      transform: scale(1.05);
    }

    section#view-resume a.back-link:hover::after {
      transform: scaleX(1);
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      section#view-resume {
        padding: 30px 20px;
        gap: 25px;
      }

      section#view-resume img {
        max-width: 90vw;
      }

      section#view-resume a.back-link {
        font-size: 1rem;
      }
    }

    @media (max-width: 480px) {
      section#view-resume {
        gap: 20px;
      }

      section#view-resume img {
        border-radius: 8px;
      }
    }
  </style>

</head>

<body>
  <section id="view-resume" data-aos="fade-up" data-aos-delay="100">
    <a href="1.png" target="_blank">
      <img src="1.png" alt="Resume Page 1" data-aos="fade-up" data-aos-delay="200">
    </a>

    <a href="2.png" target="_blank">
      <img src="2.png" alt="Resume Page 2" data-aos="fade-up" data-aos-delay="300">
    </a>

    <a href="index.html" class="back-link">&larr; Back to Portfolio</a>
  </section>

  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script>
    AOS.init({
      duration: 800,
    });
  </script>
</body>

</html>
