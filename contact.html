<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Instrument Learning</title>
    <script src="https://kit.fontawesome.com/a1d0334399.js" crossorigin="anonymous"></script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #1e1e1e, #444);
            text-align: center;
            color: #fff;
        }
        
        .container {
            width: 40%;
            margin: 50px auto;
            background: linear-gradient(to right, #ff7b00, #ffcc00);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        
        h2 {
            color: #222;
        }

        .contact-form {
            width: 100%;
            max-width: 300px;
        }

        .contact-form input, 
        .contact-form textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        .contact-form button {
            background: #007BFF;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 16px;
            transition: 0.3s ease-in-out;
        }

        .contact-form button:hover {
            background: #0056b3;
        }

        .contact-info {
            margin-top: 20px;
            font-size: 18px;
        }

        .contact-info a {
            text-decoration: none;
            margin: 0 10px;
            font-size: 30px;
            display: inline-block;
            transition: transform 0.3s ease-in-out;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(auto-fit);
            }
            40% {
                transform: translateY(auto-fit);
            }
            
            60% {
                transform: translateY(auto-fit);
            }
        
        }

        .fa-google {
            color: #db4a39;
        }
        .fa-square-instagram {
            color: #e4405f;
        }
        .fa-facebook {
            color: #3b5998;
        }
        
        .contact-info a:hover {
            transform: scale(1.2);
            animation: bounce 0.5s;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Contact Us</h2>
        <p>Have questions? Feel free to reach out to us!</p>
        
        <form class="contact-form">
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea placeholder="Your Message" rows="5" required></textarea>
            <button type="submit">Send Message</button>
        </form>
        
        <div class="contact-info">
            <p>Email: support@instrumentlearning.com</p>
            <p>Phone: 1122334455</p>
            <p>Follow us on:</p>
            <p>
                <a href="#" target="_blank"><i class="fa-brands fa-google"></i></a>
                <a href="#" target="_blank"><i class="fab fa-square-instagram"></i></a>
                <a href="#" target="_blank"><i class="fa-brands fa-facebook"></i></a>
            </p>
        </div>
    </div>

</body>
</html>
