<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses | Instrument Learning</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #1e1e1e, #444);
            color: #fff;
        }
        .container {
            width: 80%;
            margin: auto;
            padding: 20px;
        }
        header {
            background: #333;
            color: #fff;
            padding: 15px;
            text-align: center;
            position: relative;
        }
        nav {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #222;
            padding: 10px;
            border-radius: 5px;
        }
        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
        }
        nav ul li {
            padding: 8px;
        }
        nav ul li a {
            color: white;
            text-decoration: none;
            font-size: 16px;
            cursor: pointer;
        }
        .course-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .course {
            background: #fff;
            padding: 15px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s ease-in-out;
            color: #333;
            height: 100%;
        }
        .course:hover {
            transform: scale(1.05);
        }
        .course img {
            width: 100%;
            height: auto;
            border-radius: 10px;
            pointer-events: none;
        }
        .course h3 {
            margin: 10px 0 5px;
            font-size: 20px;
            color: #222;
        }
        .course p {
            font-size: 14px;
            color: #555;
        }
        /* Style for login/logout button */
        #auth-buttons {
            position: absolute;
            top: 10px;
            right: 10px;
        }
        .auth-btn {
            background-color: #44aa44;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .logout-btn {
            background-color: #ff4444;
        }
    </style>
</head>
<body>
    
    <header>
        <h1 style="text-align: center; background: linear-gradient(to left, #ff7b00, #ffcc00); -webkit-background-clip: text; color: transparent;">
            Instrument Learning Courses
        </h1>
        <div id="auth-buttons"></div>
    </header>

    <div class="container">
        <h2>Our Courses</h2>
        <div class="course-list">
            <div class="course" id="guitar-course">
                <img src="bass-guitar_16390450.gif" alt="Guitar Lessons">
                <h3>Guitar Lessons</h3>
                <p>Learn the basics of playing the guitar with expert guidance.</p>
                <a href="guitar_lessons.html"><button style="background-color: #ff7b00; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">Start Lesson</button></a>
            </div>
            
            <div class="course">
                <img src="keyboard_18821756.gif" alt="Piano Course">
                <h3>Piano Mastery</h3>
                <p>Master piano playing techniques from beginner to advanced levels.</p>
                <a href="piano_lessons.html"><button style="background-color: #ff7b00; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">Start Lesson</button></a>
            </div>
            
            <div class="course">
                <img src="cello_16390423.gif" alt="Violin Course">
                <h3>Violin Training</h3>
                <p>Develop your violin skills with structured lessons.</p>
                <a href="violin_lessons.html"><button style="background-color: #ff7b00; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">Start Lesson</button></a>
            </div>
        </div>
    </div>

    <div id="auth-buttons" style="text-align: right; margin: 10px;"></div>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        console.log("Document loaded.");

        function updateAuthButtons(loggedIn) {
            const authButtonsContainer = document.getElementById("auth-buttons");
            authButtonsContainer.innerHTML = ""; // Clear previous content

            if (loggedIn) {
                console.log("✅ User is logged in. Showing Logout button.");
                
                // ✅ Show Logout button
                const logoutBtn = document.createElement("button");
                logoutBtn.textContent = "Logout";
                logoutBtn.className = "auth-btn logout-btn";
                logoutBtn.style = "background-color: red; color: white; padding: 10px; border: none; cursor: pointer;";

                logoutBtn.addEventListener("click", function () {
                    fetch("http://localhost/tuningarc_api/logout.php")
                        .then(response => response.json())
                        .then(data => {
                            if (data.success) {
                                alert("You have been logged out.");
                                window.location.href = "index.html";
                            } else {
                                alert("Logout failed. Please try again.");
                            }
                        })
                        .catch(error => {
                            console.error("❌ Logout failed:", error);
                            alert("An error occurred while logging out.");
                        });
                });

                authButtonsContainer.appendChild(logoutBtn);
            } else {
                console.log("❌ User is NOT logged in. Showing Login button.");

                // ✅ Show Login button
                const loginBtn = document.createElement("button");
                loginBtn.textContent = "Login";
                loginBtn.className = "auth-btn login-btn";
                loginBtn.style = "background-color: green; color: white; padding: 10px; border: none; cursor: pointer;";

                loginBtn.addEventListener("click", function () {
                    window.location.href = "index.html"; // Redirect to login page
                });

                authButtonsContainer.appendChild(loginBtn);
            }
        }

        function checkLoginStatus() {
            fetch("http://localhost/tuningarc_api/check_session.php")
                .then(response => response.json())
                .then(data => {
                    console.log("ℹ️ Login status received:", data);

                    if (data.loggedIn) {
                        updateAuthButtons(true);
                    } else {
                        updateAuthButtons(false);
                    }
                })
                .catch(error => {
                    console.error("❌ Error checking login status:", error);
                    alert("An unexpected error occurred. Please check the API response.");
                });
        }

        checkLoginStatus(); // Run on page load
    });
</script>

</body>
</html>
