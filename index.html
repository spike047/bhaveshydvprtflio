<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet" />
  <title>Login Page</title>
<style>
  

  @keyframes bounce {
    0%, 20%, 50%, 80%, 100% {
        transform: translateY(-5);
    }
    40% {
        transform: translateY(-15);
    }
    60% {
        transform: translateY(-5px);
    }
}

.icons a {
    display: auto-fit;
    font-size: 15px;
    margin: 5px;
    transition: transform 0.3s ease-in-out;
}

.icons a:hover {
    animation: bounce 0.6s ease;
    transform: scale(1.2);
}

.fa-google {
    color: #db4a39;
}

.fa-square-instagram {
    color: #e4405f;
}

.fa-facebook {
    color: #3b5998;
}
</style>
</head>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
  integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
  crossorigin="anonymous" referrerpolicy="no-referrer" />

<body>
  <div class="container" id="container">

    <div class="sign-up">
      <form id="register-form" action="http://localhost/tuningarc_api/register.php" method="POST">
          <h1>Create Account</h1>
          <div class="icons">
              <a href="#" target="blank"><i class="fa-brands fa-google"></i></a>
              <a href="#" target="blank"><i class="fab fa-square-instagram"></i></a>
              <a href="#" target="blank"><i class="fa-brands fa-facebook"></i></a> 
          </div>
          <span>or use email for registration</span>
          <input type="text" name="name" placeholder="Full Name" required />
          <input type="email" name="email" placeholder="Email" required />
          <input type="password" name="password" placeholder="Password" required />
          <button type="submit">Register</button>
      </form>
  </div>
  
  <div class="sign-in">  
      <form id="login-form" action="http://localhost/tuningarc_api/login.php" method="POST">
          <h1>Sign In</h1>
          <div class="icons">
              <a href="#" target="blank"><i class="fa-brands fa-google"></i></a> 
              <a href="#" target="blank"><i class="fab fa-square-instagram"></i></a> 
              <a href="#" target="blank"><i class="fa-brands fa-facebook"></i></a>
          </div>
          <span>or use email and password</span>
          <input type="email" name="email" placeholder="Email" required />
          <input type="password" name="password" placeholder="Password" required />
          <button type="submit">Sign In</button>
      </form>
  </div>
  
  
    <div class="toogle-container">
      <div class="toogle">
        <div class="toogle-panel toogle-left">
          <h1>Welcome User!</h1>
          <p>If you already have an account</p>
          <button class="hidden" id="login">Sign In</button>
        </div>
        <div class="toogle-panel toogle-right">
          <h1>Hello, User!</h1>
          <p>If you don't have an account</p>
          <button class="hidden" id="register">Sign Up</button>
        </div>
      </div>
    </div>
  </div>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      // Handle Login
      document.getElementById("login-form").addEventListener("submit", function (event) {
        event.preventDefault();
    
        let email = document.querySelector("#login-form input[name='email']").value.trim();
let password = document.querySelector("#login-form input[name='password']").value.trim();

    
        let formData = { email, password };
    
        fetch("http://localhost/tuningarc_api/login.php", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(formData)
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                window.location.href = data.redirect;
            } else {
                alert(data.error);
            }
        })
        .catch(error => {
            alert("Network error! Check console.");
            console.error("Login error:", error);
        });
    });    
    
      // Handle Registration
      document.getElementById("register-form").addEventListener("submit", function (event) {
          event.preventDefault();
  
          let formData = new FormData(this);
  
          fetch("http://localhost/tuningarc_api/register.php", {
              method: "POST",
              body: formData
          })
          .then(response => response.json().catch(() => ({ success: false, error: "Invalid JSON response" }))) // Prevents crash
          .then(data => {
              console.log("Register response:", data);
              if (data.success) {
                  window.location.href = data.redirect; // Redirect after successful registration
              } else {
                  alert(data.error || "Registration failed. Please try again.");
              }
          })
          .catch(error => {
              console.error("Registration error:", error);
              alert("A network error occurred. Please try again.");
          });
      });
  });  
</script>

<script src="script.js" defer></script>
<script src="login.js" defer></script>
</body>
</html>
